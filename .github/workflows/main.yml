name: Snake Game

# Controla quando o snake será gerado/atualizado
on:
  schedule:
    # Atualiza a cada 5 horas
    - cron: "0 */5 * * *"
  # Permite disparar manualmente pela aba Actions
  workflow_dispatch:
  # Gera também sempre que você atualizar o README na main
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push generated files to the output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
